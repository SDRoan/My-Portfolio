    <script type="module">
      import { Application } from "https://esm.sh/@splinetool/runtime@1.9.54";

      const canvas = document.getElementById("spline-canvas");
      const loader = document.getElementById("spline-loader");
      const orbit = document.querySelector(".robot-orbit");

      function startOrbit() {
        if (!orbit) return;
        const nodes = Array.from(orbit.querySelectorAll(".orbit-node"));
        const ring = orbit.querySelector(".robot-orbit-ring");
        if (!nodes.length) return;

        let rotation = 0;
        let paused = false;
        orbit.addEventListener("mouseenter", () => (paused = true), true);
        orbit.addEventListener("mouseleave", () => (paused = false), true);

        const tick = () => {
          if (!paused) rotation = (rotation + 0.25) % 360;
          const radius = ring ? ring.getBoundingClientRect().width / 2 : 380;
          nodes.forEach((node, i) => {
            const angle = ((i / nodes.length) * 360 + rotation) % 360;
            const rad = (angle * Math.PI) / 180;
            const x = radius * Math.cos(rad);
            const y = radius * Math.sin(rad);
            const z = Math.round(100 + 50 * Math.cos(rad));
            const op = Math.max(0.35, Math.min(1, 0.4 + 0.6 * ((1 + Math.sin(rad)) / 2)));
            node.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            node.style.zIndex = String(z);
            node.style.opacity = String(op);
          });
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      function initModals() {
        const overlay = document.getElementById("orbit-modal");
        const body = document.getElementById("orbit-modal-body");
        const closeBtn = document.getElementById("orbit-modal-close");

        function openModal(name) {
          const tpl = document.getElementById("modal-" + name);
          if (!tpl) return;
          body.innerHTML = "";
          body.appendChild(tpl.content.cloneNode(true));
          overlay.classList.add("is-open");
          overlay.setAttribute("aria-hidden", "false");
        }
        function closeModal() {
          overlay.classList.remove("is-open");
          overlay.setAttribute("aria-hidden", "true");
        }

        document.querySelectorAll(".orbit-node").forEach((node) => {
          node.addEventListener("click", (e) => {
            e.preventDefault();
            const name = node.getAttribute("data-modal");
            if (name) openModal(name);
          });
        });

        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closeModal();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeModal();
        });
      }

      if (canvas) {
        const app = new Application(canvas);
        app
          .load("https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode")
          .then(() => {
            if (loader) loader.style.opacity = "0";
            setTimeout(() => {
              if (orbit) orbit.classList.add("is-ready");
              const sig = document.getElementById("signature");
              if (sig) setTimeout(() => sig.classList.add("is-signed"), 600);
            }, 800);
          })
          .catch((err) => {
            console.error("Spline failed to load", err);
            if (loader) loader.innerHTML = '<span style="color:#888">3D scene unavailable</span>';
            if (orbit) orbit.classList.add("is-ready");
          });
      }

      startOrbit();
      initModals();
    </script>
