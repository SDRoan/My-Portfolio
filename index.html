    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
      const gate = document.getElementById("hello-gate");
      const helloButton = document.getElementById("hello-button");
      const MATRIX_CHARS = "01IJHGFEDCBAKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
      function attachMatrixToElement(el, restText) {
        if (!el) return;
        const len = restText.length;
        let matrixInterval = null;
        el.addEventListener("mouseenter", function () {
          matrixInterval = setInterval(function () {
            let s = "";
            for (let j = 0; j < len; j++) {
              s += MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
            }
            el.textContent = s;
          }, 50);
        });
        el.addEventListener("mouseleave", function () {
          if (matrixInterval) clearInterval(matrixInterval);
          matrixInterval = null;
          el.textContent = restText;
        });
      }
      (function () {
        const heroName = document.getElementById("hero-name-value");
        if (heroName) attachMatrixToElement(heroName, '"Saibyasachi Ruhan"');
      })();
      const heroCodeTyped = document.getElementById("hero-code-typed");
      const heroCodeCursor = document.getElementById("hero-code-cursor");
      const TYPING_CHUNKS = [
        { text: '"name"', class: "code-key" },
        { text: ": ", class: "code-colon" },
        { text: '"Saibyasachi Ruhan"', class: "code-value hero-name-value" },
        { text: ",", class: "code-comma" }
      ];
      function runTypingAnimation() {
        if (!heroCodeTyped) return;
        heroCodeTyped.innerHTML = "";
        let chunkIndex = 0;
        let charIndex = 0;
        function typeNext() {
          if (chunkIndex >= TYPING_CHUNKS.length) {
            if (heroCodeCursor) heroCodeCursor.classList.add("hero-code-cursor--done");
            const heroName = document.getElementById("hero-code-typed")?.querySelector(".hero-name-value");
            if (heroName) attachMatrixToElement(heroName, '"Saibyasachi Ruhan"');
            return;
          }
          const chunk = TYPING_CHUNKS[chunkIndex];
          if (charIndex === 0) {
            const span = document.createElement("span");
            span.className = chunk.class;
            span.setAttribute("aria-hidden", "true");
            heroCodeTyped.appendChild(span);
            chunk.span = span;
          }
          if (charIndex < chunk.text.length) {
            chunk.span.textContent += chunk.text[charIndex];
            charIndex++;
            setTimeout(typeNext, 45 + Math.random() * 25);
          } else {
            chunkIndex++;
            charIndex = 0;
            setTimeout(typeNext, 80);
          }
        }
        typeNext();
      }
      if (gate && helloButton) {
        document.body.classList.add("hello-gate-active");
        helloButton.addEventListener("click", () => {
          gate.classList.add("hello-gate--hidden");
          document.body.classList.remove("hello-gate-active");
          runTypingAnimation();
        });
      }
    </script>
