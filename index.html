    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

      const HELMET_URL = "https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb";

      const bodyEl = document.body;
      const canvas = document.getElementById("spline-canvas");
      const loader = document.getElementById("spline-loader");
      const orbit = document.querySelector(".robot-orbit");

      function startOrbit() {
        if (!orbit) return;
        const nodes = Array.from(orbit.querySelectorAll(".orbit-node"));
        const ring = orbit.querySelector(".robot-orbit-ring");
        if (!nodes.length) return;

        let rotation = 0;
        let paused = false;
        orbit.addEventListener("mouseenter", () => (paused = true), true);
        orbit.addEventListener("mouseleave", () => (paused = false), true);

        const tick = () => {
          const orbitHidden = bodyEl.classList.contains("modal-active");
          if (!paused && !orbitHidden) rotation = (rotation + 0.25) % 360;
          const radius = ring ? ring.getBoundingClientRect().width / 2 : 380;
          nodes.forEach((node, i) => {
            const angle = ((i / nodes.length) * 360 + rotation) % 360;
            const rad = (angle * Math.PI) / 180;
            const x = radius * Math.cos(rad);
            const y = radius * Math.sin(rad);
            const z = Math.round(100 + 50 * Math.cos(rad));
            const op = Math.max(0.35, Math.min(1, 0.4 + 0.6 * ((1 + Math.sin(rad)) / 2)));
            node.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            node.style.zIndex = String(z);
            node.style.opacity = orbitHidden ? "0" : String(op);
          });
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      function initModals() {
        const overlay = document.getElementById("orbit-modal");
        const card = overlay.querySelector(".orbit-modal-card");
        const body = document.getElementById("orbit-modal-body");
        const closeBtn = document.getElementById("orbit-modal-close");

        function openModal(name) {
          const tpl = document.getElementById("modal-" + name);
          if (!tpl) return;
          body.innerHTML = "";
          body.appendChild(tpl.content.cloneNode(true));
          if (card) {
            card.setAttribute("data-section", name);
            card.scrollTop = 0;
          }
          bodyEl.classList.add("modal-active");
          overlay.classList.add("is-open");
          overlay.setAttribute("aria-hidden", "false");
        }
        function closeModal() {
          bodyEl.classList.remove("modal-active");
          overlay.classList.remove("is-open");
          overlay.setAttribute("aria-hidden", "true");
          if (card) {
            card.removeAttribute("data-section");
          }
        }

        document.querySelectorAll(".orbit-node").forEach((node) => {
          node.addEventListener("click", (e) => {
            e.preventDefault();
            const name = node.getAttribute("data-modal");
            if (name) openModal(name);
          });
        });

        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closeModal();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeModal();
        });
      }

      function startScene() {
        if (!canvas) return;
        let mouseX = 0, mouseY = 0;

        const damp = (current, target, ease) => current + (target - current) * ease;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
        camera.position.set(0, 0, 4.5);

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

        function resize() {
          const w = canvas.clientWidth || window.innerWidth;
          const h = canvas.clientHeight || window.innerHeight;
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener("resize", resize, { passive: true });

        const key = new THREE.DirectionalLight(0xffffff, 1.0);
        key.position.set(3, 2, 4);
        scene.add(key);
        const rimAmber = new THREE.PointLight(0xffb347, 8, 12, 2);
        rimAmber.position.set(-2.6, 1.4, 2.2);
        scene.add(rimAmber);
        const rimCyan = new THREE.PointLight(0x3fd4ff, 8, 12, 2);
        rimCyan.position.set(2.6, -0.9, 2.2);
        scene.add(rimCyan);
        const rimTop = new THREE.PointLight(0xbfe7ff, 4, 10, 2);
        rimTop.position.set(0, 2.8, -1.4);
        scene.add(rimTop);

        const backdrop = new THREE.Mesh(
          new THREE.SphereGeometry(4.5, 48, 48),
          new THREE.MeshBasicMaterial({ color: 0x11284a, transparent: true, opacity: 0.16, side: THREE.BackSide })
        );
        scene.add(backdrop);

        const helmetGroup = new THREE.Group();
        scene.add(helmetGroup);

        const starCount = 550;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
          const r = 3 + Math.random() * 2.6;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          starPos[i * 3 + 2] = r * Math.cos(phi);
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({
          color: 0xffffff, size: 0.013, transparent: true, opacity: 0.85,
          blending: THREE.AdditiveBlending, depthWrite: false,
        });
        const stars = new THREE.Points(starGeo, starsMat);
        scene.add(stars);

        const nebCount = 260;
        const nebPos = new Float32Array(nebCount * 3);
        for (let i = 0; i < nebCount; i++) {
          const r = 3.6 + Math.random() * 2.8;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          nebPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          nebPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          nebPos[i * 3 + 2] = r * Math.cos(phi);
        }
        const nebGeo = new THREE.BufferGeometry();
        nebGeo.setAttribute("position", new THREE.BufferAttribute(nebPos, 3));
        const nebulaMat = new THREE.PointsMaterial({
          color: 0x6ebdff, size: 0.05, transparent: true, opacity: 0.28,
          blending: THREE.AdditiveBlending, depthWrite: false,
        });
        const nebula = new THREE.Points(nebGeo, nebulaMat);
        scene.add(nebula);

        canvas.addEventListener("mousemove", (e) => {
          mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        new GLTFLoader().load(HELMET_URL, (gltf) => {
          const obj = gltf.scene;
          const box = new THREE.Box3().setFromObject(obj);
          const size = new THREE.Vector3(); box.getSize(size);
          const center = new THREE.Vector3(); box.getCenter(center);
          obj.position.sub(center);
          const maxDim = Math.max(size.x, size.y, size.z);
          obj.scale.setScalar(1.7 / maxDim);
          helmetGroup.add(obj);

          if (loader) loader.style.opacity = "0";
          setTimeout(() => {
            if (orbit) orbit.classList.add("is-ready");
          }, 200);
        }, undefined, (err) => {
          console.error("Helmet failed to load", err);
          if (loader) loader.innerHTML = '<span style="color:#888">3D scene unavailable</span>';
          if (orbit) orbit.classList.add("is-ready");
        });

        const clock = new THREE.Clock();
        let sceneOffset = 0;
        let sceneLift = 0;
        let currentYaw = 0;
        let currentPitch = 0;
        let currentRoll = 0;
        function tick() {
          const t = clock.getElapsedTime();
          const modalOpen = bodyEl.classList.contains("modal-active");
          const targetOffset = window.innerWidth > 980 ? (modalOpen ? -0.92 : 0) : 0;
          const targetLift = modalOpen ? -0.06 : 0;
          const yawTarget = modalOpen ? 0.98 : t * 0.3 + mouseX * 0.35;
          const pitchTarget = modalOpen ? 0.06 : 0.08 + mouseY * 0.2;
          const rollTarget = modalOpen ? -0.08 : 0;

          sceneOffset = damp(sceneOffset, targetOffset, 0.06);
          sceneLift = damp(sceneLift, targetLift, 0.06);
          currentYaw = damp(currentYaw, yawTarget, 0.08);
          currentPitch = damp(currentPitch, pitchTarget, 0.08);
          currentRoll = damp(currentRoll, rollTarget, 0.08);

          helmetGroup.position.x = sceneOffset;
          helmetGroup.position.y = sceneLift;
          helmetGroup.rotation.y = currentYaw;
          helmetGroup.rotation.x = currentPitch;
          helmetGroup.rotation.z = currentRoll;
          backdrop.position.x = sceneOffset * 0.14;
          stars.position.x = sceneOffset * 0.18;
          nebula.position.x = sceneOffset * 0.16;
          stars.rotation.y = t * 0.02;
          nebula.rotation.y = -t * 0.03;

          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      startScene();
      startOrbit();
      initModals();
    </script>
  </body>
</html>
