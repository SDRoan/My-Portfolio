<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | Saibyasachi Ruhan</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="contact-immersive">
    <canvas id="shader-canvas" class="shader-bg" aria-hidden="true"></canvas>

    <main class="contact-main">
      <section class="section contact-hero">
        <div class="container section-inner narrow">
          <div class="contact-intro">
            <span class="contact-eyebrow">Let's connect</span>
            <h1 class="contact-title">Say hi.</h1>
          </div>

          <div class="contact-card glass">
            <div class="contact-card-row">
              <span class="contact-card-label">Email</span>
              <a
                class="contact-card-value"
                href="mailto:sabyasachidasrohan71@gmail.com"
                data-copy-email="sabyasachidasrohan71@gmail.com"
                >sabyasachidasrohan71@gmail.com</a
              >
            </div>
            <div class="contact-card-divider"></div>
            <div class="contact-card-row contact-card-row--links">
              <a
                class="contact-social"
                href="https://www.linkedin.com/in/saibyasachi-ruhan-b6351718a/"
                target="_blank"
                rel="noreferrer"
                >LinkedIn <span aria-hidden="true">→</span></a
              >
              <a
                class="contact-social"
                href="https://github.com/SDRoan"
                target="_blank"
                rel="noreferrer"
                >GitHub <span aria-hidden="true">→</span></a
              >
            </div>
          </div>

          <a href="index.html" class="contact-back">← Back to home</a>
        </div>
      </section>
    </main>

    <script src="shader-bg.js"></script>
    <script src="features.js"></script>
    <script src="enhancements.js"></script>
  </body>
</html>
